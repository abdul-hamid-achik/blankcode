name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "packages/exercise-parser/**"
      - "docker/runners/**"
      - "infra/docker/**"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/blankcode-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx turbo test --filter=@blankcode/api

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Copy stack files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "infra/docker/docker-stack.yml,infra/docker/Caddyfile"
          target: /opt/blankcode
          strip_components: 2

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            # Deploy/update stack
            cd /opt/blankcode
            REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }} \
            VERSION=${{ github.sha }} \
            docker stack deploy -c docker-stack.yml blankcode

            # Cleanup old images
            docker image prune -f

  build-runners:
    needs: test
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[build-runners]') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        runner: [typescript, python, react, go, rust]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./docker/runners
          file: ./docker/runners/Dockerfile.${{ matrix.runner }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/blankcode-runner-${{ matrix.runner }}:latest
