x-dev-build: &dev-build
  build:
    context: .
    dockerfile_inline: |
      FROM oven/bun:1-debian
      RUN apt-get update && \
          apt-get install -y --no-install-recommends \
            git python3 make g++ ca-certificates curl && \
          install -m 0755 -d /etc/apt/keyrings && \
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc && \
          chmod a+r /etc/apt/keyrings/docker.asc && \
          echo "deb [arch=$$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $$(. /etc/os-release && echo $$VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list && \
          apt-get update && \
          apt-get install -y --no-install-recommends docker-ce-cli && \
          rm -rf /var/lib/apt/lists/*
      WORKDIR /app

x-dev-volumes: &dev-volumes
  - .:/app
  - node_modules:/app/node_modules
  - api_node_modules:/app/apps/api/node_modules
  - web_node_modules:/app/apps/web/node_modules
  - db_node_modules:/app/packages/db/node_modules
  - shared_node_modules:/app/packages/shared/node_modules
  - parser_node_modules:/app/packages/exercise-parser/node_modules
  - importer_node_modules:/app/tools/content-importer/node_modules
  - generator_node_modules:/app/tools/exercise-generator/node_modules

services:
  postgres:
    image: postgres:17-alpine
    container_name: blankcode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-blankcode}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blankcode}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    <<: *dev-build
    container_name: blankcode-api
    restart: unless-stopped
    command: >
      sh -c "bun install &&
             bunx turbo build --filter=@blankcode/shared --filter=@blankcode/db &&
             cd packages/db && bunx drizzle-kit push --force && cd /app &&
             bun --watch apps/api/src/main.ts"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-blankcode}
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      NODE_ENV: development
    ports:
      - "${API_PORT:-3000}:3000"
    volumes: *dev-volumes
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  web:
    <<: *dev-build
    container_name: blankcode-web
    restart: unless-stopped
    command: >
      sh -c "bun install &&
             cd apps/web && bunx nuxi dev --host 0.0.0.0"
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_API_URL: http://api:3000
    ports:
      - "3001:3000"
    volumes: *dev-volumes
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # SECURITY NOTE: Worker requires Docker socket access for sandboxed code execution.
  # The 'user: root' and Docker socket mount grant host-level Docker access.
  worker:
    <<: *dev-build
    container_name: blankcode-worker
    restart: unless-stopped
    user: root
    command: >
      sh -c "bun install &&
             bunx turbo build --filter=@blankcode/shared --filter=@blankcode/db &&
             bun --watch apps/api/src/workers/index.ts"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-blankcode}
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-me}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      NODE_ENV: development
      DOCKER_ENABLED: ${DOCKER_ENABLED:-true}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-60000}
      EXECUTION_MEMORY_MB: ${EXECUTION_MEMORY_MB:-256}
      EXECUTION_WORKSPACE_PATH: /tmp/blankcode-workspaces
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - parser_node_modules:/app/packages/exercise-parser/node_modules
      - importer_node_modules:/app/tools/content-importer/node_modules
      - generator_node_modules:/app/tools/exercise-generator/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/blankcode-workspaces:/tmp/blankcode-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'process.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # Code execution runners — build with: docker compose --profile runners build
  runner-typescript:
    profiles: ["runners"]
    build:
      context: ./docker/runners
      dockerfile: Dockerfile.typescript
    image: blankcode/runner-typescript:latest

  runner-python:
    profiles: ["runners"]
    build:
      context: ./docker/runners
      dockerfile: Dockerfile.python
    image: blankcode/runner-python:latest

  runner-react:
    profiles: ["runners"]
    build:
      context: ./docker/runners
      dockerfile: Dockerfile.react
    image: blankcode/runner-react:latest

  runner-go:
    profiles: ["runners"]
    build:
      context: ./docker/runners
      dockerfile: Dockerfile.go
    image: blankcode/runner-go:latest

  runner-rust:
    profiles: ["runners"]
    build:
      context: ./docker/runners
      dockerfile: Dockerfile.rust
    image: blankcode/runner-rust:latest

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  db_node_modules:
  shared_node_modules:
  parser_node_modules:
  importer_node_modules:
  generator_node_modules:
